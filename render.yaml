# Blueprint Render — API NestJS + Neon (Postgres na nuvem)
# https://render.com/docs/infrastructure-as-code
# https://neon.tech/docs/connect/connection-strings
#
# Neon (duas URIs no painel da Neon → copiar para a Render):
#   - DATABASE_URL = **Pooled** (host com "-pooler") — runtime da API.
#   - DATABASE_URL_UNPOOLED = **Direct** (sem "-pooler") — Prisma Migrate usa via directUrl no schema (evita P1002).
#   Acrescente em ambas, se faltar: ?sslmode=require&connect_timeout=30 (cold start / TLS).
#   PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK=1 evita P1002 (timeout do pg_advisory_lock) com Neon/latência; só um deploy por vez.
# Se o Start Command no painel da Render for manual, apague-o para o blueprint abaixo valer.
#
# No Blueprint, o Render pede DATABASE_URL e DATABASE_URL_UNPOOLED (sync: false).
#
# Depois: na Vercel, BACKEND_URL = URL pública desta API na Render.
# Ajuste CORS_ORIGIN / APP_PUBLIC_URL no painel se não for historico-escolar.vercel.app
#
# Build: NODE_ENV=production faz o npm ci omitir devDependencies; --include=dev instala @nestjs/cli e prisma.

services:
  - type: web
    name: historico-escolar-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK
        value: "1"
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: DISABLE_DEV_ROUTES
        value: "true"
      - key: CORS_ORIGIN
        value: https://historico-escolar.vercel.app
      - key: APP_PUBLIC_URL
        value: https://historico-escolar.vercel.app
