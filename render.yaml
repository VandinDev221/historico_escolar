# Blueprint Render — API NestJS + PostgreSQL
# https://render.com/docs/infrastructure-as-code
#
# 1) Dashboard → New → Blueprint → conecte este repositório.
# 2) CORS_ORIGIN e APP_PUBLIC_URL vêm com a URL da Vercel abaixo; se o seu domínio for outro, altere no painel (Environment).
# 3) Na Vercel, defina BACKEND_URL = URL pública deste serviço (ex.: https://historico-escolar-api.onrender.com)
# Plano free: sem preDeployCommand — migrações rodam no start antes do Nest.

databases:
  - name: historico-escolar-db
    plan: free
    region: oregon
    databaseName: armazena_historico

services:
  - type: web
    name: historico-escolar-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: historico-escolar-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: DISABLE_DEV_ROUTES
        value: "true"
      - key: CORS_ORIGIN
        value: https://historico-escolar.vercel.app
      - key: APP_PUBLIC_URL
        value: https://historico-escolar.vercel.app
