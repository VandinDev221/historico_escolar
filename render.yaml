# Blueprint Render — API NestJS (Web Service free)
# https://render.com/docs/infrastructure-as-code
#
# PostgreSQL NÃO é criado aqui: a Render permite só UM banco Postgres "free" ativo por conta.
# Opções:
#   • Use um Postgres que você já tenha na Render (copie a Internal/External Database URL), ou
#   • Apague o outro banco free antigo no dashboard e crie um novo Postgres manualmente, ou
#   • Use Neon / Supabase / outro Postgres e cole a connection string.
#
# Na criação do Blueprint, o Render pedirá DATABASE_URL (sync: false).
#
# Depois do deploy: na Vercel defina BACKEND_URL = URL pública desta API.
# CORS_ORIGIN / APP_PUBLIC_URL: ajuste no painel se não for historico-escolar.vercel.app

services:
  - type: web
    name: historico-escolar-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: DISABLE_DEV_ROUTES
        value: "true"
      - key: CORS_ORIGIN
        value: https://historico-escolar.vercel.app
      - key: APP_PUBLIC_URL
        value: https://historico-escolar.vercel.app
