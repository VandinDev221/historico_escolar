# Blueprint Render — API NestJS + Neon (Postgres na nuvem)
# https://render.com/docs/infrastructure-as-code
# https://neon.tech/docs/connect/connection-strings
#
# Neon:
#   1) Crie projeto em https://console.neon.tech
#   2) Em "Connection details", copie a URI (role, host ep-*.neon.tech, database neondb).
#   3) Garanta SSL na URL: adicione ?sslmode=require se o console não incluir.
#   4) Para Prisma migrate na Render, prefira a string "Direct" (sem pooler) no Neon;
#      se usar apenas "Pooled", migrações podem falhar — nesse caso veja DIRECT_URL no .env.example.
#
# No Blueprint, o Render pede DATABASE_URL (sync: false) — cole a URI do Neon.
#
# Depois: na Vercel, BACKEND_URL = URL pública desta API na Render.
# Ajuste CORS_ORIGIN / APP_PUBLIC_URL no painel se não for historico-escolar.vercel.app
#
# Build: NODE_ENV=production faz o npm ci omitir devDependencies; --include=dev instala @nestjs/cli e prisma.

services:
  - type: web
    name: historico-escolar-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: DISABLE_DEV_ROUTES
        value: "true"
      - key: CORS_ORIGIN
        value: https://historico-escolar.vercel.app
      - key: APP_PUBLIC_URL
        value: https://historico-escolar.vercel.app
