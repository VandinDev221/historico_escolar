# Blueprint Render — API NestJS + Neon (Postgres na nuvem)
# https://render.com/docs/infrastructure-as-code
# https://neon.tech/docs/connect/connection-strings
#
# Neon (duas URIs no painel da Render):
#   - DATABASE_URL = connection string **Pooled** (host com "-pooler").
#   - DIRECT_URL   = connection string **Direct** (host sem "-pooler"). Obrigatória: `prisma migrate deploy` usa
#     advisory lock e estoura P1002 com só o pooler.
#   SSL: ?sslmode=require nas duas se o console não incluir.
#
# No Blueprint, o Render pede DATABASE_URL e DIRECT_URL (sync: false).
#
# Depois: na Vercel, BACKEND_URL = URL pública desta API na Render.
# Ajuste CORS_ORIGIN / APP_PUBLIC_URL no painel se não for historico-escolar.vercel.app
#
# Build: NODE_ENV=production faz o npm ci omitir devDependencies; --include=dev instala @nestjs/cli e prisma.

services:
  - type: web
    name: historico-escolar-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: npm ci --include=dev && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20.18.1"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: TRUST_PROXY
        value: "true"
      - key: DISABLE_DEV_ROUTES
        value: "true"
      - key: CORS_ORIGIN
        value: https://historico-escolar.vercel.app
      - key: APP_PUBLIC_URL
        value: https://historico-escolar.vercel.app
